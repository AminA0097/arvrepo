<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer class="border-t border-leather-200/70 bg-white/90 backdrop-blur-lg shadow-soft mt-auto" th:fragment="footer">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:py-12 lg:px-8">

        <!-- Footer Description -->
        <p class="mx-auto max-w-2xl text-center text-sm leading-relaxed text-leather-600 sm:text-base">
            بزرگترین فروشگاه آنلاین چرم و محصولات چرمی با بهترین کیفیت و قیمت مناسب.
            ارائه‌دهنده انواع کیف، کفش، کمربند و اکسسوری‌های چرمی اصل.
        </p>

        <!-- Divider -->
        <div class="my-6 h-px bg-gradient-to-r from-transparent via-leather-200 to-transparent lg:my-8"></div>

        <!-- Footer Bottom -->
        <div class="flex flex-col items-center justify-between gap-4 sm:flex-row sm:gap-6">

            <!-- Copyright -->
            <span class="text-center text-xs text-leather-500 sm:text-right sm:text-sm">
                © ۱۴۰۴ — تمامی حقوق این وب‌سایت متعلق به
                <strong class="font-extrabold text-leather-800">چرم آروند</strong>
                می‌باشد.
            </span>

            <!-- Contact Badge -->
            <div class="flex items-center gap-3 rounded-2xl border border-leather-200/60 bg-leather-50/80 px-4 py-2 shadow-sm backdrop-blur-sm transition hover:border-leather-300 hover:bg-leather-50 sm:px-5 sm:py-2.5">
                <div class="flex h-8 w-8 items-center justify-center rounded-full bg-leather-100 text-leather-600 sm:h-9 sm:w-9">
                    <i class="fa-solid fa-headset text-sm sm:text-base"></i>
                </div>
                <div class="flex flex-col items-start">
                    <span class="text-[10px] font-medium uppercase tracking-wider text-leather-400 sm:text-xs">
                        تلفن پشتیبانی
                    </span>
                    <span class="text-sm font-bold text-leather-800 sm:text-base" dir="ltr">
                        ۰۲۱-۶۱۹۳۰۰۰۰
                    </span>
                </div>
            </div>

        </div>

        <!-- Mobile Bottom Border (optional decorative) -->
        <div class="mt-4 text-center text-[10px] text-leather-300 sm:hidden">
            <span>چرم آروند — کیفیت در هر دوخت</span>
        </div>

    </div>
</footer>

</body>
</html>
