<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="categories(categoryPage)">
    <style>
        /* Categories Section */
        .ar-categories-section {
            padding: 1.5rem 0;
            position: relative;
            background: rgba(250, 249, 248, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(232, 227, 222, 0.5);
            border-bottom: 1px solid rgba(232, 227, 222, 0.5);
        }

        .ar-categories-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .ar-categories-title {
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #2F1E12;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ar-categories-title-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            background: linear-gradient(135deg, #8B5E3C, #6F472B);
            border-radius: 0.75rem;
            color: white;
            font-size: 0.875rem;
        }

        .ar-categories-more-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: #6F472B;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .ar-categories-more-link:hover {
            color: #A8794E;
            gap: 0.75rem;
        }

        .ar-categories-more-link i {
            font-size: 0.75rem;
        }

        /* Categories Grid */
        .ar-categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        /* Category Item */
        .ar-category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            border: 1px solid rgba(232, 227, 222, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            min-height: 140px;
            position: relative;
        }

        .ar-category-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(47, 30, 18, 0.12);
            border-color: #D6C2AE;
            background: rgba(255, 255, 255, 0.98);
        }

        .ar-category-item:active {
            transform: scale(0.96);
        }

        .ar-category-icon {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            overflow: hidden;
            background: #F8F5F1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            border: 2px solid rgba(232, 227, 222, 0.3);
        }

        .ar-category-item:hover .ar-category-icon {
            transform: scale(1.05);
            border-color: #A8794E;
        }

        .ar-category-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ar-category-icon .fa-icon-placeholder {
            font-size: 1.5rem;
            color: #D6C2AE;
        }

        .ar-category-label {
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: #2F1E12;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ar-category-count {
            font-family: 'Tanha-FD', serif;
            font-size: 0.7rem;
            font-weight: 500;
            color: #9A9390;
            background: rgba(241, 233, 225, 0.5);
            padding: 0.125rem 0.625rem;
            border-radius: 9999px;
        }

        /* Empty State */
        .ar-categories-empty {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 3rem 1rem;
            font-family: 'Shabnam', system-ui, sans-serif;
            color: #9A9390;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
            border: 2px dashed rgba(232, 227, 222, 0.6);
        }

        .ar-categories-empty i {
            font-size: 2.5rem;
            color: #D6C2AE;
        }

        .ar-categories-empty span {
            font-size: 0.875rem;
        }

        /* Footer / Load More */
        .ar-categories-footer {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .ar-categories-load-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.5rem;
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: #6F472B;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(232, 227, 222, 0.6);
            border-radius: 2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .ar-categories-load-more:hover {
            background: rgba(255, 255, 255, 0.98);
            border-color: #A8794E;
            color: #A8794E;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(47, 30, 18, 0.1);
            gap: 0.75rem;
        }

        .ar-categories-load-more i {
            font-size: 0.75rem;
        }

        /* Responsive */
        @media (min-width: 640px) {
            .ar-categories-section {
                padding: 2rem 0;
            }

            .ar-categories-title {
                font-size: 1.5rem;
            }

            .ar-categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1.25rem;
            }

            .ar-category-item {
                padding: 1.75rem 1.25rem;
                min-height: 160px;
            }

            .ar-category-icon {
                width: 4.5rem;
                height: 4.5rem;
            }
        }

        @media (min-width: 1024px) {
            .ar-categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1.5rem;
            }

            .ar-category-item {
                padding: 2rem 1.5rem;
                min-height: 180px;
            }

            .ar-category-icon {
                width: 5rem;
                height: 5rem;
            }
        }

        @media (max-width: 480px) {
            .ar-categories-header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
            }

            .ar-categories-more-link {
                justify-content: center;
            }

            .ar-categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 0.75rem;
            }

            .ar-category-item {
                padding: 1rem 0.75rem;
                min-height: 120px;
            }

            .ar-category-icon {
                width: 3.25rem;
                height: 3.25rem;
            }

            .ar-category-label {
                font-size: 0.75rem;
            }

            .ar-category-count {
                font-size: 0.6rem;
            }
        }
    </style>

    <section class="ar-categories-section">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

            <!-- Header -->
            <div class="ar-categories-header">
                <h2 class="ar-categories-title">
                    <span class="ar-categories-title-icon">
                        <i class="fa-solid fa-grid-2"></i>
                    </span>
                    خرید بر اساس دسته‌بندی
                </h2>
                <a href="/categories" class="ar-categories-more-link">
                    مشاهده همه
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
            </div>

            <!-- Categories Grid -->
            <div class="ar-categories-grid">

                <a th:each="category : ${categoryPage.data}"
                   th:if="${category.inGrid}"
                   th:href="${category.href}"
                   class="ar-category-item">

                    <!-- Category Icon -->
                    <div class="ar-category-icon">
                        <img th:src="@{/api/category/image/{categoryId}(categoryId=${category.picUrl})}"
                             th:alt="${category.faName}"
                             loading="lazy"
                             width="56"
                             height="56"
                             onerror="this.style.display='none'; this.parentElement.innerHTML = '<i class=\'fa-solid fa-folder-open fa-icon-placeholder\'></i>';">
                    </div>

                    <!-- Category Name -->
                    <span class="ar-category-label" th:text="${category.faName}"></span>

                    <!-- Product Count -->
                    <span class="ar-category-count"
                          th:if="${category.countt != null and category.countt > 0}"
                          th:text="${category.countt + ' محصول'}">
                    </span>
                </a>

                <!-- Empty State -->
                <div class="ar-categories-empty"
                     th:if="${categoryPage == null or categoryPage.data == null or categoryPage.data.isEmpty()}">
                    <i class="fa-solid fa-folder-open"></i>
                    <span>دسته‌بندی‌ای یافت نشد</span>
                </div>

            </div>

            <!-- Footer / Load More -->
            <div class="ar-categories-footer"
                 th:if="${categoryPage != null and categoryPage.totalPages > 1}">
                <a href="/categories" class="ar-categories-load-more">
                    نمایش همه دسته‌بندی‌ها
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </div>

        </div>
    </section>

</th:block>

</body>
</html>
