<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پربازدیدترین‌ها</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>

<th:block th:fragment="mostViews">
    <style>
        /* Most Views Section */
        .ar-mostviews-section {
            padding: 1.5rem 0;
            position: relative;
            background: rgba(250, 249, 248, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(232, 227, 222, 0.5);
            border-bottom: 1px solid rgba(232, 227, 222, 0.5);
        }

        .ar-mostviews-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .ar-mostviews-title {
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #2F1E12;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ar-mostviews-title-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            border-radius: 0.75rem;
            color: white;
            font-size: 0.875rem;
        }

        .ar-mostviews-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: #6F472B;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .ar-mostviews-more:hover {
            color: #A8794E;
            gap: 0.75rem;
        }

        .ar-mostviews-more i {
            font-size: 0.75rem;
        }

        /* Swiper Container */
        .ar-mostviews-swiper {
            overflow: hidden;
            padding: 0.5rem 0.25rem;
        }

        .ar-mostviews-swiper .swiper-wrapper {
            padding: 0.25rem 0;
        }

        .ar-mostviews-swiper .swiper-slide {
            width: 200px;
            height: auto;
        }

        /* Product Card - Same as Amazing */
        .ar-mostviews-product-card {
            display: block;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(47, 30, 18, 0.06);
            transition: all 0.3s ease;
            border: 1px solid rgba(232, 227, 222, 0.6);
            height: 100%;
            position: relative;
        }

        .ar-mostviews-product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(47, 30, 18, 0.12);
            border-color: #D6C2AE;
            background: rgba(255, 255, 255, 0.98);
        }

        .ar-mostviews-image-wrapper {
            position: relative;
            padding-top: 100%;
            background: #F8F5F1;
            overflow: hidden;
        }

        .ar-mostviews-image {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .ar-mostviews-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .ar-mostviews-product-card:hover .ar-mostviews-image img {
            transform: scale(1.05);
        }

        /* Rank Badge */
        .ar-mostviews-rank-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-family: 'Tanha-FD', serif;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            background: #9A9390;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 2;
            min-width: 1.5rem;
            text-align: center;
        }

        .ar-mostviews-rank-badge.gold {
            background: linear-gradient(135deg, #FCD34D, #F59E0B);
            color: #78350F;
            box-shadow: 0 2px 12px rgba(245, 158, 11, 0.4);
        }

        .ar-mostviews-rank-badge.silver {
            background: linear-gradient(135deg, #E5E7EB, #9CA3AF);
            color: #1F2937;
            box-shadow: 0 2px 12px rgba(156, 163, 175, 0.4);
        }

        .ar-mostviews-rank-badge.bronze {
            background: linear-gradient(135deg, #FDE68A, #D97706);
            color: #78350F;
            box-shadow: 0 2px 12px rgba(217, 119, 6, 0.4);
        }

        .ar-mostviews-product-title {
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: #2F1E12;
            padding: 0.75rem 0.875rem 0.25rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.75rem;
            line-height: 1.4;
        }

        .ar-mostviews-product-price {
            font-family: 'Tanha-FD', serif;
            font-size: 1rem;
            font-weight: 700;
            color: #A8794E;
            padding: 0.25rem 0.875rem 0.5rem;
        }

        .ar-mostviews-product-price-currency {
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.625rem;
            font-weight: 400;
            color: #9A9390;
        }

        .ar-mostviews-product-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.875rem 0.75rem;
            border-top: 1px solid rgba(241, 233, 225, 0.6);
            gap: 0.5rem;
        }

        .ar-mostviews-meta-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-family: 'Shabnam', system-ui, sans-serif;
            font-size: 0.7rem;
            color: #9A9390;
        }

        .ar-mostviews-meta-item .icon {
            font-size: 0.6rem;
        }

        .ar-mostviews-meta-item .value {
            font-weight: 500;
        }

        .ar-mostviews-meta-item.discount {
            color: #A8794E;
        }

        .ar-mostviews-meta-item.views-highlight {
            color: #3B82F6;
            font-weight: 600;
        }

        /* Skeleton Styles */
        .ar-mostviews-skeleton-image {
            width: 100%;
            padding-top: 100%;
            background: linear-gradient(90deg, #F1E9E1 25%, #E8E3DE 50%, #F1E9E1 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }

        .ar-mostviews-skeleton-title {
            height: 0.75rem;
            margin: 0.75rem 0.875rem 0.25rem;
            background: linear-gradient(90deg, #F1E9E1 25%, #E8E3DE 50%, #F1E9E1 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.25rem;
        }

        .ar-mostviews-skeleton-price {
            height: 1rem;
            width: 40%;
            margin: 0.25rem 0.875rem 0.5rem;
            background: linear-gradient(90deg, #F1E9E1 25%, #E8E3DE 50%, #F1E9E1 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.25rem;
        }

        .ar-mostviews-skeleton-meta {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 0.875rem;
            border-top: 1px solid rgba(241, 233, 225, 0.6);
        }

        .ar-mostviews-skeleton-meta-item {
            height: 0.5rem;
            flex: 1;
            background: linear-gradient(90deg, #F1E9E1 25%, #E8E3DE 50%, #F1E9E1 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.25rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* Pagination */
        .ar-mostviews-pagination {
            display: flex;
            justify-content: center;
            gap: 0.375rem;
            margin-top: 1rem;
        }

        .ar-mostviews-pagination .swiper-pagination-bullet {
            width: 0.5rem;
            height: 0.5rem;
            background: #D6C2AE;
            opacity: 1;
            border-radius: 9999px;
            transition: all 0.3s ease;
        }

        .ar-mostviews-pagination .swiper-pagination-bullet-active {
            width: 1.5rem;
            background: #A8794E;
        }

        /* Empty State */
        .ar-mostviews-empty {
            font-family: 'Shabnam', system-ui, sans-serif;
            text-align: center;
            padding: 2rem 1rem;
            color: #9A9390;
        }

        .ar-mostviews-empty-icon {
            font-size: 2.5rem;
            color: #D6C2AE;
            margin-bottom: 0.5rem;
        }

        /* Responsive - Same as Amazing */
        @media (min-width: 640px) {
            .ar-mostviews-section {
                padding: 2rem 0;
            }

            .ar-mostviews-title {
                font-size: 1.5rem;
            }

            .ar-mostviews-swiper .swiper-slide {
                width: 220px;
            }
        }

        @media (min-width: 1024px) {
            .ar-mostviews-swiper .swiper-slide {
                width: 240px;
            }
        }

        @media (max-width: 480px) {
            .ar-mostviews-header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
            }

            .ar-mostviews-swiper .swiper-slide {
                width: 160px;
            }

            .ar-mostviews-more {
                justify-content: center;
            }
        }
    </style>

    <section class="ar-mostviews-section">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

            <!-- Header -->
            <div class="ar-mostviews-header">
                <h2 class="ar-mostviews-title">
                    <span class="ar-mostviews-title-icon">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                    پربازدیدترین‌ها
                </h2>

                <a href="/most-views" class="ar-mostviews-more">
                    مشاهده همه
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
            </div>

            <!-- Swiper -->
            <div class="swiper ar-mostviews-swiper" id="mostviewsSwiper">
                <div class="swiper-wrapper">
                    <!-- Product cards will be rendered here -->
                </div>
                <!-- Pagination -->
                <div class="ar-mostviews-pagination"></div>
            </div>

        </div>
    </section>
</th:block>

</body>
</html>
